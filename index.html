<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <meta name="theme-color" content="#7A3A18" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Caminos AR" />
  <link rel="apple-touch-icon" href="pwa_icon_192.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>De Cuestas, Abras y Quebradas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <header class="header">
      <div class="header-inner">
        <div class="compass-wrap">
          <svg class="compass-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="dg" cx="40%" cy="35%" r="65%"><stop offset="0%" stop-color="#C8845A"/><stop offset="40%" stop-color="#A0552A"/><stop offset="100%" stop-color="#5C2A0E"/></radialGradient>
              <radialGradient id="cg" cx="40%" cy="35%" r="60%"><stop offset="0%" stop-color="#D4956A"/><stop offset="100%" stop-color="#7A3A18"/></radialGradient>
              <filter id="sh"><feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#2A1005" flood-opacity="0.6"/></filter>
            </defs>
            <circle cx="60" cy="60" r="57" fill="url(#dg)" filter="url(#sh)"/>
            <circle cx="60" cy="60" r="54" fill="none" stroke="#7A3A18" stroke-width="1.5" opacity="0.6"/>
            <g stroke="#9A5530" stroke-width="0.8" opacity="0.7"><line x1="60" y1="8" x2="60" y2="14"/><line x1="60" y1="106" x2="60" y2="112"/><line x1="8" y1="60" x2="14" y2="60"/><line x1="106" y1="60" x2="112" y2="60"/></g>
            <polygon points="60,6 64,52 60,58 56,52" fill="#1A0A02"/>
            <polygon points="60,114 64,68 60,62 56,68" fill="#1A0A02"/>
            <polygon points="6,60 52,56 58,60 52,64" fill="#1A0A02"/>
            <polygon points="114,60 68,56 62,60 68,64" fill="#1A0A02"/>
            <polygon points="18,18 52,54 58,60 50,52" fill="#C07040"/>
            <polygon points="102,18 68,54 62,60 70,52" fill="#C07040"/>
            <polygon points="18,102 52,66 58,60 50,68" fill="#C07040"/>
            <polygon points="102,102 68,66 62,60 70,68" fill="#C07040"/>
            <circle cx="60" cy="60" r="18" fill="#6A3018" stroke="#C8845A" stroke-width="1"/>
            <circle cx="60" cy="60" r="14" fill="url(#cg)" stroke="#9A5530" stroke-width="0.8"/>
            <circle cx="60" cy="60" r="5" fill="#D4956A" stroke="#5C2A0E" stroke-width="1"/>
            <circle cx="60" cy="60" r="2.5" fill="#1A0A02"/>
            <text x="60" y="28" text-anchor="middle" font-family="serif" font-size="8" font-weight="bold" fill="#E8C090">N</text>
            <polygon points="60,10 62,22 60,20 58,22" fill="#E8D0A0" opacity="0.9"/>
          </svg>
        </div>
        <div class="logo-area">
          <div class="app-title">De Cuestas, Abras y Quebradas</div>
          <div class="app-sub">Caminos emblemáticos de la Argentina</div>
        </div>
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input type="search" id="searchInput" class="search-input"
            placeholder="Ingresá ruta, provincia o lugar"
            autocomplete="off" spellcheck="false"/>
          <button class="search-clear" id="searchClear" title="Limpiar">✕</button>
        </div>
      </div>
    </header>

    <div class="toolbar" id="toolbarWrap">
      <div class="toolbar-track" id="toolbarTrack">
        <!-- Grupo tipo -->
        <div class="tab-section" id="tipoSection">
          <button class="pill" id="tipo-TODOS" onclick="filterTipo('TODOS',this)">Todos</button>
          <button class="pill" onclick="filterTipo('ABRA',this)">Abras</button>
          <button class="pill" onclick="filterTipo('CUESTA',this)">Cuestas</button>
          <button class="pill" onclick="filterTipo('QUEBRADA',this)">Quebradas</button>
          <button class="pill" onclick="filterTipo('RUTA ESCÉNICA',this)">Rutas Escénicas</button>
        </div>
        <div class="toolbar-sep"></div>
        <!-- Grupo especial -->
        <div class="tab-section tab-section--special">
          <button class="pill filter-special active" onclick="filterSpecial('TODOS',this)">Todos</button>
          <button class="pill filter-special fav-pill" onclick="filterSpecial('FAVORITOS',this)">♥ Favs</button>
          <button class="pill filter-special done-pill" onclick="filterSpecial('VISITADOS',this)">✓ Visitados</button>
          <button class="pill random-pill" onclick="showRandom()">🎲 Al azar</button>
        </div>
      </div>
    </div>

    <div class="main">
      <aside class="sidebar">
        <div class="sidebar-count" id="sideCount">— caminos</div>
        <div id="sideList"></div>
      </aside>
      <section class="detail" id="detail">
        <div class="empty-state">
          <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" width="36" height="36" opacity="0.2">
            <circle cx="60" cy="60" r="57" fill="#A0552A"/>
            <polygon points="60,6 64,52 60,58 56,52" fill="#1A0A02"/>
            <polygon points="60,114 64,68 60,62 56,68" fill="#1A0A02"/>
            <polygon points="6,60 52,56 58,60 52,64" fill="#1A0A02"/>
            <polygon points="114,60 68,56 62,60 68,64" fill="#1A0A02"/>
            <polygon points="18,18 52,54 58,60 50,52" fill="#C07040"/>
            <polygon points="102,18 68,54 62,60 70,52" fill="#C07040"/>
            <polygon points="18,102 52,66 58,60 50,68" fill="#C07040"/>
            <polygon points="102,102 68,66 62,60 70,68" fill="#C07040"/>
            <circle cx="60" cy="60" r="14" fill="#7A3A18"/>
            <circle cx="60" cy="60" r="5" fill="#D4956A"/>
          </svg>
          <div class="empty-txt">Seleccioná un camino</div>
        </div>
      </section>
    </div>
  </div>

  <div class="maps-modal" id="mapsModal" onclick="closeMaps(event)">
    <div class="maps-modal-inner">
      <div class="maps-modal-header">
        <span id="mapsTitle">Google Maps</span>
        <button class="maps-close" onclick="closeMapsBtn()">✕</button>
      </div>
      <iframe id="mapsFrame" class="maps-frame" src="" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
  </div>

  <!-- Lightbox -->
  <div id="lb-overlay">
    <img id="lb-img" src="" alt="" draggable="false"/>
    <button id="lb-close" aria-label="Cerrar">✕</button>
    <div id="lb-badge"></div>
    <div id="lb-hint">Pellizco para zoom · Arrastrá para mover · Doble tap para zoom</div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
